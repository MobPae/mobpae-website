<?xml version="1.0" encoding="UTF-8"?>
<!--
  mobpae-logo-dark.svg  —  Full logo, dark-background version
  Emerald symbol + WHITE wordmark on transparent background.
  Use on dark surfaces (footers, hero sections, dark cards).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 290" role="img" aria-label="MobPae logo">
  <title>MobPae</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- Emerald symbol -->
  <g transform="translate(156 8) scale(2)">
    <rect x="11" y="9" width="72" height="76" rx="15.5" ry="15.5"
          fill="none" stroke="#0F8F72" stroke-width="12" stroke-linejoin="round"/>
    <rect x="26" y="55" width="10" height="14" rx="2.5" fill="#0F8F72"/>
    <rect x="42" y="47" width="10" height="22" rx="2.5" fill="#0F8F72"/>
    <rect x="58" y="37" width="10" height="32" rx="2.5" fill="#0F8F72"/>
  </g>

  <!-- White wordmark -->
  <text
    x="250" y="272"
    font-family="'DM Sans', 'Montserrat', ui-sans-serif, system-ui, sans-serif"
    font-weight="700"
    font-size="88"
    letter-spacing="5"
    text-anchor="middle"
    fill="#FFFFFF">MOBPAE</text>
</svg>
