<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none" role="img" aria-label="MobPae logo">
  <title>MobPae</title>
  <defs>
    <clipPath id="logo-clip-white">
      <rect width="120" height="120" rx="24" ry="24"/>
    </clipPath>
    <style>@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@700&amp;display=swap');</style>
  </defs>
  <!-- Icon (white outline on transparent) -->
  <rect width="120" height="120" rx="24" ry="24" fill="rgba(255,255,255,0.2)"/>
  <g clip-path="url(#logo-clip-white)">
    <polygon points="10,120 31,120 79,0 58,0" fill="white" opacity="0.95"/>
    <polygon points="36,120 57,120 105,0 84,0" fill="white" opacity="0.95"/>
    <polygon points="62,120 83,120 120,31 120,5" fill="white" opacity="0.95"/>
  </g>
  <!-- White wordmark -->
  <text x="148" y="80" font-family="'DM Sans', Inter, ui-sans-serif, sans-serif" font-weight="700" font-size="60" fill="white" letter-spacing="-1">MobPae</text>
</svg>
